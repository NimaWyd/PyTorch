<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ML Roadmap 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e0e0ec;font-family:'Inter',sans-serif;padding:28px 16px 80px;min-height:100vh}
.wrap{max-width:700px;margin:0 auto}

h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px}
.sub{font-size:12px;color:#555570;margin-bottom:28px}

/* progress bar */
.prog-wrap{margin-bottom:28px}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-label{font-size:11px;color:#555570;text-transform:uppercase;letter-spacing:.06em}
.prog-pct{font-size:12px;color:#fff;font-weight:600}
.bar{height:4px;background:#1e1e2a;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .4s}

/* phase label */
.phase-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#555570;margin:28px 0 10px;padding-left:2px}

/* week card */
.week{background:#16161e;border:1px solid #23232f;border-radius:12px;margin-bottom:10px;overflow:hidden}
.week-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.week-hdr:hover{background:#1c1c28}
.week-num{font-size:10px;font-weight:700;background:#23232f;color:#8b8ba8;padding:3px 8px;border-radius:6px;flex-shrink:0}
.week-title{font-size:13px;font-weight:600;color:#e0e0ec;flex:1}
.week-done{font-size:11px;color:#555570;flex-shrink:0}
.week-done.complete{color:#6366f1}
.chevron{color:#333345;font-size:12px;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}

/* week body */
.week-body{display:none;border-top:1px solid #23232f}

/* day row */
.day{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid #1e1e28}
.day:last-of-type{border-bottom:none}
.day-check{margin-top:2px;flex-shrink:0;accent-color:#6366f1;cursor:pointer;width:15px;height:15px}
.day-content{flex:1;min-width:0}
.day-label{font-size:10px;font-weight:700;color:#555570;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.day-topic{font-size:13px;color:#c8c8e0;line-height:1.5;margin-bottom:5px}
.day.checked .day-topic{color:#3a3a55;text-decoration:line-through}
.vid-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#7c7cff;text-decoration:none;padding:3px 8px;background:#1a1a2e;border:1px solid #2a2a45;border-radius:5px;transition:border-color .15s}
.vid-link:hover{border-color:#6366f1}
.vid-play{font-size:10px;color:#f87171}

/* project box */
.proj-box{margin:12px 16px 14px;background:#0d0d18;border:1px solid #2a2a3e;border-radius:10px;padding:14px}
.proj-tag{font-size:10px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.proj-title{font-size:13px;font-weight:600;color:#d0d0e8;margin-bottom:8px}
.proj-tasks{list-style:none;display:flex;flex-direction:column;gap:5px}
.proj-tasks li{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#8080a0;line-height:1.5}
.proj-tasks li input{margin-top:2px;flex-shrink:0;accent-color:#a78bfa;cursor:pointer}
.proj-tasks li.done span{color:#3a3a55;text-decoration:line-through}
</style>
</head>
<body>
<div class="wrap">
  <h1>ML Roadmap 2026</h1>
  <p class="sub">Daily study plan · Video link per day · Weekly project · 30 weeks</p>

  <div class="prog-wrap">
    <div class="prog-top">
      <span class="prog-label">Overall Progress</span>
      <span class="prog-pct" id="pct">0%</span>
    </div>
    <div class="bar"><div class="bar-fill" id="bar" style="width:0%"></div></div>
  </div>

  <div id="root"></div>
</div>

// ── State ──────────────────────────────────────────────────────────────────────
let state = {};
const expanded = new Set();

function stateKey(w, d) { return `w${w}-d${d}`; }
function projKey(w, i) { return `w${w}-p${i}`; }

function save() { try { localStorage.setItem('mlr26simple', JSON.stringify(state)); } catch(e){} }
function load() { try { const r = localStorage.getItem('mlr26simple'); if (r) state = JSON.parse(r); } catch(e){ state = {}; } }

function totalItems() {
  let t = 0, d = 0;
  weeks.forEach((w, wi) => {
    w.days.forEach((_, di) => { t++; if (state[stateKey(wi, di)]) d++; });
    if (w.proj) w.proj.tasks.forEach((_, ti) => { t++; if (state[projKey(wi, ti)]) d++; });
  });
  return { t, d };
}

function updateProgress() {
  const { t, d } = totalItems();
  const pct = t ? Math.round(d / t * 100) : 0;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('bar').style.width = pct + '%';

  weeks.forEach((w, wi) => {
    const el = document.getElementById('wd-' + wi);
    if (!el) return;
    let done = 0, total = w.days.length + (w.proj ? w.proj.tasks.length : 0);
    w.days.forEach((_, di) => { if (state[stateKey(wi, di)]) done++; });
    if (w.proj) w.proj.tasks.forEach((_, ti) => { if (state[projKey(wi, ti)]) done++; });
    const complete = done === total;
    el.textContent = complete ? '✓ done' : done + '/' + total;
    el.className = 'week-done' + (complete ? ' complete' : '');
    const card = document.getElementById('wcard-' + wi);
    if (card) card.style.borderColor = complete ? '#2a2a50' : '';
  });
}

function toggleWeek(wi) {
  if (expanded.has(wi)) expanded.delete(wi); else expanded.add(wi);
  const body = document.getElementById('wbody-' + wi);
  const chev = document.getElementById('wchev-' + wi);
  if (body) body.style.display = expanded.has(wi) ? 'block' : 'none';
  if (chev) chev.className = 'chevron' + (expanded.has(wi) ? ' open' : '');
}

function checkDay(wi, di) {
  const k = stateKey(wi, di);
  state[k] = !state[k];
  const row = document.getElementById('day-' + wi + '-' + di);
  if (row) row.className = 'day' + (state[k] ? ' checked' : '');
  const cb = document.getElementById('cb-' + wi + '-' + di);
  if (cb) cb.checked = state[k];
  save(); updateProgress();
}

function checkProj(wi, ti) {
  const k = projKey(wi, ti);
  state[k] = !state[k];
  const row = document.getElementById('pt-' + wi + '-' + ti);
  if (row) row.className = state[k] ? 'done' : '';
  const cb = document.getElementById('pcb-' + wi + '-' + ti);
  if (cb) cb.checked = state[k];
  save(); updateProgress();
}

function render() {
  const root = document.getElementById('root');
  let html = '';
  let lastPhase = '';

  weeks.forEach((w, wi) => {
    if (w.phase !== lastPhase) {
      const colors = { Beginner: '#4ade80', Intermediate: '#fb923c', Advanced: '#f87171' };
      html += `<div class="phase-label" style="color:${colors[w.phase]}">${w.phase} Phase</div>`;
      lastPhase = w.phase;
    }

    const isOpen = expanded.has(wi);
    html += `<div class="week" id="wcard-${wi}">
      <div class="week-hdr" onclick="toggleWeek(${wi})">
        <span class="week-num">Week ${w.n}</span>
        <span class="week-title">${w.title}</span>
        <span class="week-done" id="wd-${wi}">0/${w.days.length + (w.proj ? w.proj.tasks.length : 0)}</span>
        <span class="chevron${isOpen ? ' open' : ''}" id="wchev-${wi}">▼</span>
      </div>
      <div class="week-body" id="wbody-${wi}" style="display:${isOpen ? 'block' : 'none'}">`;

    w.days.forEach((day, di) => {
      const k = stateKey(wi, di);
      const done = state[k] || false;
      html += `<div class="day${done ? ' checked' : ''}" id="day-${wi}-${di}">
        <input class="day-check" type="checkbox" id="cb-${wi}-${di}" ${done ? 'checked' : ''} onchange="checkDay(${wi},${di})">
        <div class="day-content">
          <div class="day-label">${day.d}</div>
          <div class="day-topic">${day.topic}</div>
          <a class="vid-link" href="${day.url}" target="_blank">
            <span class="vid-play">▶</span>${day.label}
          </a>
        </div>
      </div>`;
    });

    if (w.proj) {
      html += `<div class="proj-box">
        <div class="proj-tag">Weekly Project</div>
        <div class="proj-title">${w.proj.title}</div>
        <ul class="proj-tasks">`;
      w.proj.tasks.forEach((task, ti) => {
        const k = projKey(wi, ti);
        const done = state[k] || false;
        html += `<li class="${done ? 'done' : ''}" id="pt-${wi}-${ti}">
          <input type="checkbox" id="pcb-${wi}-${ti}" ${done ? 'checked' : ''} onchange="checkProj(${wi},${ti})">
          <span>${task}</span>
        </li>`;
      });
      html += `</ul></div>`;
    }

    html += `</div></div>`;
  });

  root.innerHTML = html;
  updateProgress();
}

load(); render();
</script>
